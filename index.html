<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="aya logo.png">
    <title>AYA Jewellery</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #f2f4f8, #e6ebf2);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        #editor {
            position: relative;
            display: inline-block;
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        #video {
            width: 92vw;
            max-width: 420px;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
        }

        #logo {
            position: absolute;
            width: 90px;
            cursor: move;
            top: 20px;
            left: 20px;
        }

        .input-group {
            margin-top: 20px;
        }

        .input-group input {
            width: 85vw;
            max-width: 320px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            padding: 12px 18px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            background: #4a90e2;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        canvas {
            margin-top: 20px;
            max-width: 95vw;
            border-radius: 10px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>

    <h2>AYA Jewellery</h2>

    <div id="editor">

        <video id="video" autoplay playsinline></video>

        <img id="logo" src="aya logo.png">

    </div>

    <div class="input-group">
        <input id="caption" placeholder="Add caption">
    </div>

    <br>

    <label>
        <input type="checkbox" id="showLogo" checked> Show Logo
    </label>

    <br>

    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download</button>

    <br>

    <canvas id="output"></canvas>

    <script>

        const video = document.getElementById("video");
        const logo = document.getElementById("logo");
        const output = document.getElementById("output");
        const octx = output.getContext("2d");

        const tempCanvas = document.createElement("canvas");
        const tctx = tempCanvas.getContext("2d");

        let zoom = 1;

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            }
        })
            .then(stream => {
                video.srcObject = stream;
            });

        video.addEventListener("click", () => {
            capture();
        });

        function capture() {

            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            tctx.drawImage(video, 0, 0);

        }

        function dragElement(el) {

            let offsetX, offsetY;

            el.onmousedown = (e) => {

                offsetX = e.offsetX;
                offsetY = e.offsetY;

                document.onmousemove = (e) => {

                    let rect = document.getElementById("editor").getBoundingClientRect();

                    let x = e.clientX - rect.left - offsetX;
                    let y = e.clientY - rect.top - offsetY;

                    el.style.left = x + "px";
                    el.style.top = y + "px";

                }

                document.onmouseup = () => {
                    document.onmousemove = null;
                }

            }

        }

        dragElement(logo);

        function generate() {

            capture();

            const border = 12;
            const bottomSpace = 60;
            const finalSize = 500;

            const scaleFactor = 3;

            output.width = (finalSize + border * 2) * scaleFactor;
            output.height = output.width+ bottomSpace;

            output.style.width = (finalSize + border * 2) + "px";
            output.style.height = (finalSize + border + bottomSpace) + "px";

            octx.setTransform(1, 0, 0, 1, 0, 0);
            octx.scale(scaleFactor, scaleFactor);

            octx.fillStyle = "white";
            octx.fillRect(0, 0, finalSize + border * 2, finalSize + border + bottomSpace);

            const size = Math.min(tempCanvas.width, tempCanvas.height);

            const sx = (tempCanvas.width - size) / 2;
            const sy = (tempCanvas.height - size) / 2;

            octx.drawImage(
                tempCanvas,
                sx, sy, size, size,
                border, border,
                finalSize, finalSize
            );

            if (document.getElementById("showLogo").checked) {

                let videoRect = video.getBoundingClientRect();
                let logoRect = logo.getBoundingClientRect();

                let lx = logoRect.left - videoRect.left;
                let ly = logoRect.top - videoRect.top;

                let scale = finalSize / videoRect.width;

                const logoWidth = 90;
                const logoHeight = logo.naturalHeight * (logoWidth / logo.naturalWidth);

                octx.drawImage(
                    logo,
                    lx * scale + border,
                    ly * scale + border,
                    logoWidth,
                    logoHeight
                );

            }

            let text = document.getElementById("caption").value;

            octx.fillStyle = "black";
            octx.font = "22px Arial";
            octx.textAlign = "center";

            octx.fillText(
                text,
                (finalSize + border * 2)/1.4,
                finalSize + border + 25
            );

        }

        function download() {

            let link = document.createElement("a");

            link.download = "aya-photo.png";
            link.href = output.toDataURL("image/png");

            link.click();

        }

    </script>

</body>

</html>
